grpc:
  host: "0.0.0.0"
  port: 5001
  connect_timeout: 3
  max_pool_size: 200

http:
  host: "0.0.0.0"
  port: 8080

log:
  level: debug
  file_path: ./logs/ceramicraft-payment-mservice.log

mysql:
  host: "mysql"
  port: "3306"
  userName: "root"
  dbName: "payment_db"

kafka:
  brokers: ["kafka:9092"]
  group_id: "ceramicraft-payment-group"
  max_bytes: 10485760
  commit_interval: 0
